<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1>PROJECT ON ASYNC</h1>
    <button id="stop">STOP</button>
    <button id="start">START</button>
</body>
    

<script>
    // a little assignment is that whenever i press start the interval should start and whenever i press stop it should stop
    const Name = function(str){
        console.log(`${str}, Garvit`);
        
    }
    document.querySelector('#start')
    .addEventListener('click',function(){
    
     {interval = setInterval(Name,1000,"Hi")}globalThis 
    })
    document.querySelector('#stop')
    .addEventListener('click',function(){
        clearInterval(interval)
    })
    
    </script>
</html>
